<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libaura – Your Personal Library</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <span class="logo-icon">📚</span>
        <h1 class="logo-text">Libaura</h1>
      </div>
      <p class="tagline">Your personal library, beautifully organized</p>
    </div>
  </header>

  <!-- Stats Bar -->
  <section class="stats-bar">
    <div class="stat-item">
      <span class="stat-number" id="total-books">0</span>
      <span class="stat-label">Total Books</span>
    </div>
    <div class="stat-item">
      <span class="stat-number" id="reading-books">0</span>
      <span class="stat-label">Reading</span>
    </div>
    <div class="stat-item">
      <span class="stat-number" id="completed-books">0</span>
      <span class="stat-label">Completed</span>
    </div>
    <div class="stat-item">
      <span class="stat-number" id="wishlist-books">0</span>
      <span class="stat-label">Wishlist</span>
    </div>
  </section>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Add Book Section -->
    <section class="add-book-section">
      <h2 class="section-title">Add a Book</h2>
      <form id="add-book-form" class="add-book-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="book-title">Title <span class="required">*</span></label>
            <input type="text" id="book-title" placeholder="Enter book title" required />
          </div>
          <div class="form-group">
            <label for="book-author">Author <span class="required">*</span></label>
            <input type="text" id="book-author" placeholder="Enter author name" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="book-genre">Genre</label>
            <select id="book-genre">
              <option value="">Select genre</option>
              <option value="Fiction">Fiction</option>
              <option value="Non-Fiction">Non-Fiction</option>
              <option value="Mystery">Mystery</option>
              <option value="Science Fiction">Science Fiction</option>
              <option value="Fantasy">Fantasy</option>
              <option value="Biography">Biography</option>
              <option value="History">History</option>
              <option value="Self-Help">Self-Help</option>
              <option value="Romance">Romance</option>
              <option value="Thriller">Thriller</option>
              <option value="Horror">Horror</option>
              <option value="Poetry">Poetry</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="book-status">Status</label>
            <select id="book-status">
              <option value="wishlist">📌 Wishlist</option>
              <option value="reading">📖 Currently Reading</option>
              <option value="completed">✅ Completed</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="book-year">Year</label>
            <input type="number" id="book-year" placeholder="Publication year" min="1000" max="2099" />
          </div>
          <div class="form-group">
            <label for="book-rating">Rating</label>
            <div class="star-rating" id="star-rating">
              <button type="button" class="star" data-value="1">★</button>
              <button type="button" class="star" data-value="2">★</button>
              <button type="button" class="star" data-value="3">★</button>
              <button type="button" class="star" data-value="4">★</button>
              <button type="button" class="star" data-value="5">★</button>
            </div>
            <input type="hidden" id="book-rating" value="0" />
          </div>
        </div>
        <div class="form-group full-width">
          <label for="book-notes">Notes</label>
          <textarea id="book-notes" placeholder="Add your notes or review…" rows="3"></textarea>
        </div>
        <div id="form-error" class="form-error" hidden></div>
        <button type="submit" class="btn btn-primary">Add to Library</button>
      </form>
    </section>

    <!-- Library Section -->
    <section class="library-section">
      <div class="library-header">
        <h2 class="section-title">My Library</h2>
        <div class="library-controls">
          <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="Search books…" />
          </div>
          <select id="filter-status" class="filter-select">
            <option value="all">All Books</option>
            <option value="reading">Reading</option>
            <option value="completed">Completed</option>
            <option value="wishlist">Wishlist</option>
          </select>
          <select id="filter-genre" class="filter-select">
            <option value="all">All Genres</option>
          </select>
          <select id="sort-books" class="filter-select">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="title">Title A–Z</option>
            <option value="author">Author A–Z</option>
            <option value="rating">Top Rated</option>
          </select>
        </div>
      </div>

      <div id="book-list" class="book-list">
        <div class="empty-state" id="empty-state">
          <span class="empty-icon">📖</span>
          <p>Your library is empty. Add your first book above!</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal" hidden aria-modal="true" role="dialog" aria-labelledby="modal-title">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Edit Book</h3>
        <button class="modal-close" id="modal-close" aria-label="Close modal">✕</button>
      </div>
      <form id="edit-book-form" class="add-book-form" novalidate>
        <input type="hidden" id="edit-book-id" />
        <div class="form-row">
          <div class="form-group">
            <label for="edit-title">Title <span class="required">*</span></label>
            <input type="text" id="edit-title" required />
          </div>
          <div class="form-group">
            <label for="edit-author">Author <span class="required">*</span></label>
            <input type="text" id="edit-author" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="edit-genre">Genre</label>
            <select id="edit-genre">
              <option value="">Select genre</option>
              <option value="Fiction">Fiction</option>
              <option value="Non-Fiction">Non-Fiction</option>
              <option value="Mystery">Mystery</option>
              <option value="Science Fiction">Science Fiction</option>
              <option value="Fantasy">Fantasy</option>
              <option value="Biography">Biography</option>
              <option value="History">History</option>
              <option value="Self-Help">Self-Help</option>
              <option value="Romance">Romance</option>
              <option value="Thriller">Thriller</option>
              <option value="Horror">Horror</option>
              <option value="Poetry">Poetry</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit-status">Status</label>
            <select id="edit-status">
              <option value="wishlist">📌 Wishlist</option>
              <option value="reading">📖 Currently Reading</option>
              <option value="completed">✅ Completed</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="edit-year">Year</label>
            <input type="number" id="edit-year" min="1000" max="2099" />
          </div>
          <div class="form-group">
            <label>Rating</label>
            <div class="star-rating" id="edit-star-rating">
              <button type="button" class="star" data-value="1">★</button>
              <button type="button" class="star" data-value="2">★</button>
              <button type="button" class="star" data-value="3">★</button>
              <button type="button" class="star" data-value="4">★</button>
              <button type="button" class="star" data-value="5">★</button>
            </div>
            <input type="hidden" id="edit-rating" value="0" />
          </div>
        </div>
        <div class="form-group full-width">
          <label for="edit-notes">Notes</label>
          <textarea id="edit-notes" rows="3"></textarea>
        </div>
        <div id="edit-form-error" class="form-error" hidden></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancel-edit">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <footer class="footer">
    <p>Libaura &copy; <span id="footer-year"></span> — Your personal library, beautifully organized</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
